services:
  game-server:
    image: renegademaster/zomboid-dedicated-server:latest
    container_name: ${GAME_SERVER_CONTAINER_NAME:-pz-game-server}
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/home/steam/amd64-entrypoint.sh"]
    ports:
      - "${PZ_GAME_PORT:-16261}:${PZ_GAME_PORT:-16261}/udp"
      - "${PZ_DIRECT_PORT:-16262}:${PZ_DIRECT_PORT:-16262}/udp"
    environment:
      ADMIN_PASSWORD: ${PZ_ADMIN_PASSWORD:-admin}
      ADMIN_USERNAME: ${PZ_ADMIN_USERNAME:-admin}
      AUTOSAVE_INTERVAL: ${PZ_AUTOSAVE_INTERVAL:-15}
      BIND_IP: "0.0.0.0"
      DEFAULT_PORT: ${PZ_GAME_PORT:-16261}
      GAME_VERSION: ${PZ_STEAM_BRANCH:-public}
      GC_CONFIG: ${PZ_GC_CONFIG:-ZGC}
      MAP_NAMES: ${PZ_MAP_NAMES:-Muldraugh, KY}
      MAX_PLAYERS: ${PZ_MAX_PLAYERS:-16}
      MAX_RAM: ${PZ_MAX_RAM:-4096m}
      MOD_NAMES: "${PZ_MOD_IDS:-}"
      MOD_WORKSHOP_IDS: ${PZ_WORKSHOP_IDS:-}
      PAUSE_ON_EMPTY: ${PZ_PAUSE_ON_EMPTY:-true}
      PUBLIC_SERVER: ${PZ_PUBLIC_SERVER:-true}
      RCON_PASSWORD: ${PZ_RCON_PASSWORD:-changeme}
      RCON_PORT: ${PZ_RCON_PORT:-27015}
      SERVER_NAME: ${PZ_SERVER_NAME:-ZomboidServer}
      SERVER_PASSWORD: ${PZ_SERVER_PASSWORD:-}
      STEAM_VAC: ${PZ_STEAM_VAC:-true}
      UDP_PORT: ${PZ_DIRECT_PORT:-16262}
      USE_STEAM: "true"
      TZ: ${TZ:-UTC}
    volumes:
      - zomboid-server:/home/steam/ZomboidDedicatedServer
      - zomboid-data:/home/steam/Zomboid
      - lua-bridge:/home/steam/Zomboid/Lua
      - ./game-server/mods/ZomboidManager:/home/steam/Zomboid/mods/ZomboidManager:ro
      - ./game-server/amd64-entrypoint.sh:/home/steam/amd64-entrypoint.sh:ro
      - ./game-server/configure-server.sh:/home/steam/configure-server.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "grep -q \":$(printf '%04X' ${PZ_RCON_PORT:-27015}) \" /proc/net/tcp6 /proc/net/tcp 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - zomboid-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: pz-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app-vendor:/var/www/html/vendor
      - app-node-modules:/var/www/html/node_modules
      - app-build:/var/www/html/public/build
      - zomboid-data:/pz-data
      - zomboid-server:/pz-server:ro
      - backup-data:/backups
      - lua-bridge:/lua-bridge
      - map-tiles:/map-tiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-zomboid}
      DB_USERNAME: ${DB_USERNAME:-zomboid}
      DB_PASSWORD: ${DB_PASSWORD:-zomboid}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GAME_SERVER_CONTAINER_NAME: ${GAME_SERVER_CONTAINER_NAME:-pz-game-server}
      PZ_DATA_PATH: /pz-data
      PZ_SERVER_PATH: /pz-server
      PZ_SERVER_NAME: ${PZ_SERVER_NAME:-ZomboidServer}
      PZ_RCON_HOST: game-server
      PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-changeme}
      BACKUP_PATH: /backups
      LUA_BRIDGE_PATH: /lua-bridge
      PZ_MAP_TILES_PATH: /map-tiles
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      API_KEY: ${API_KEY:-}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      CACHE_STORE: ${CACHE_STORE:-database}
      TZ: ${TZ:-UTC}
    networks:
      - zomboid-net
      - backend-net

  queue:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: pz-queue
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work redis --tries=3 --timeout=600 --sleep=3
    volumes:
      - app-vendor:/var/www/html/vendor
      - zomboid-data:/pz-data
      - zomboid-server:/pz-server:ro
      - backup-data:/backups
      - lua-bridge:/lua-bridge
      - map-tiles:/map-tiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-zomboid}
      DB_USERNAME: ${DB_USERNAME:-zomboid}
      DB_PASSWORD: ${DB_PASSWORD:-zomboid}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GAME_SERVER_CONTAINER_NAME: ${GAME_SERVER_CONTAINER_NAME:-pz-game-server}
      PZ_DATA_PATH: /pz-data
      PZ_SERVER_PATH: /pz-server
      PZ_SERVER_NAME: ${PZ_SERVER_NAME:-ZomboidServer}
      PZ_RCON_HOST: game-server
      PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-changeme}
      BACKUP_PATH: /backups
      LUA_BRIDGE_PATH: /lua-bridge
      PZ_MAP_TILES_PATH: /map-tiles
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      TZ: ${TZ:-UTC}
    networks:
      - zomboid-net
      - backend-net

  db:
    image: postgres:16-alpine
    container_name: pz-db
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zomboid}
      POSTGRES_USER: ${DB_USERNAME:-zomboid}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zomboid}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-zomboid} -d ${DB_DATABASE:-zomboid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
      - zomboid-net

  redis:
    image: redis:7-alpine
    container_name: pz-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: /bin/sh -c 'exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

networks:
  zomboid-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

volumes:
  app-vendor:
    name: pz-app-vendor
  app-node-modules:
    name: pz-app-node-modules
  app-build:
    name: pz-app-build
  zomboid-server:
    name: pz-server-files
  zomboid-data:
    name: pz-data
  postgres-data:
    name: pz-postgres
  redis-data:
    name: pz-redis
  backup-data:
    name: pz-backups
  lua-bridge:
    name: pz-lua-bridge
  map-tiles:
    name: pz-map-tiles
